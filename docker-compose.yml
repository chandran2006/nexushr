services:
  postgres:
    image: postgres:16-alpine
    container_name: nexushr-postgres
    environment:
      POSTGRES_DB: nexushr
      POSTGRES_USER: nexushr
      POSTGRES_PASSWORD: nexushr123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexushr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexushr-net

  redis:
    image: redis:7-alpine
    container_name: nexushr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexushr-net

  backend:
    # image: tag is required for `docker compose pull` to work on the server.
    # In local dev, remove the image: line and use `build:` instead.
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/nexushr-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexushr-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexushr
      DB_USERNAME: nexushr
      DB_PASSWORD: nexushr123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-nexushr-super-secret-jwt-key-2024-enterprise-grade-security-key-minimum-256-bits}
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    networks:
      - nexushr-net
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/nexushr-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexushr-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nexushr-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
  logs:

networks:
  nexushr-net:
    driver: bridge
