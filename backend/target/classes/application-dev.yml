# ============================================================
# NexusHR - Local Development Profile (H2 in-memory, no Redis/PostgreSQL)
# Run: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/nexushr?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Chandran@2006
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

  cache:
    type: simple

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.data.redis.RedisHealthContributorAutoConfiguration

server:
  port: 8081

app:
  frontend-url: http://localhost:5173

  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  health:
    redis:
      enabled: false
    mail:
      enabled: false
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.nexushr: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
