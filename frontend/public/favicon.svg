<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bolt" x1="10" y1="3" x2="22" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="32" height="32" rx="8" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Lightning bolt / Zap icon -->
  <path
    d="M18.5 3L9 17.5H16L13.5 29L23 14.5H16L18.5 3Z"
    fill="url(#bolt)"
    filter="url(#glow)"
  />
</svg>
